 document.getElementById('summary').innerHTML=`
 <div class="card project-card"><div class="label">Tiến độ dự án</div><div class="progressline"><b>${p.overall}% hoàn thành</b><span>${p.completed}/${p.total} task</span></div><div class="bar"><i style="width:${p.overall}%"></i></div><div class="desc">Cập nhật gần nhất: ${esc(p.updated)}</div></div>
 <div class="card"><div class="label">Trạng thái hiện tại</div><div class="number" style="font-size:16px;margin-top:8px">${esc(p.status)}</div><div class="desc">Giai đoạn 1 / 4</div></div>
 <div class="card"><div class="label">Cần theo dõi</div><div class="number">${awaiting}</div><div class="desc">Điều kiện chuyển giai đoạn</div></div>
 <div class="card"><div class="label">Giai đoạn hiện tại</div><div class="number">${currentPhase().progress}%</div><div class="desc">${currentPhase().done}/${currentPhase().total} task hoàn thành</div></div>
 <div class="card"><div class="label">Cập nhật cuối</div><div class="number" style="font-size:15px;margin-top:8px">07/07 · 14:30</div><div class="desc">Hợp đồng đang chờ khách ký</div></div>`;
}
function renderPhases(){document.getElementById('phaseList').innerHTML=DATA.phases.map((p,i)=>`<button class="phase ${i===activePhase?'active':''}" onclick="selectPhase(${i})"><span class="phase-num">${p.id}</span><span style="min-width:0;flex:1"><div class="phase-name">${esc(p.name)}</div><div class="phase-info">${p.status==='active'?'Đang thực hiện':p.status==='open'?'Theo yêu cầu':'Chưa bắt đầu'}</div><div class="phase-progress"><span class="mini-bar"><i style="width:${p.progress}%"></i></span><span class="mini-pct">${p.progress}%</span></div></span></button>`).join('')}
function gateRow(g){return `<div class="gate-row"><div class="gate-icon">${g.status==='done'?'✓':'!'}</div><div><div class="gate-main">${esc(g.name)}</div><div class="gate-sub">${esc(g.owner)} · ${esc(g.evidence)}</div></div><span class="gate-status">${g.status==='waiting'?'Chờ':'Chưa có'}</span></div>`}
function taskRow(t,jid){const selected=activeJob===jid&&activeTask===t.id;return `<div class="task ${selected?'selected':''}" onclick="selectTask('${jid}','${t.id}')"><span class="status-dot ${t.status}">${statusMark[t.status]}</span><div class="task-main"><div class="task-name">${esc(t.name)}</div><div class="task-sub">${esc(t.assignee)} · Hạn: ${esc(t.due)}</div></div><div class="task-time">${t.status==='done'?'Đã xong':t.status==='waiting'?'Đang chờ':'Kế hoạch'}</div></div>`}
function jobCard(j){const selected=activeJob===j.id;return `<section class="job ${selected?'selected':''}"><div class="job-head" onclick="selectJob('${j.id}')"><span class="job-code">${esc(j.id)}</span><div class="job-text"><div class="job-name">${esc(j.name)}</div><div class="job-meta"><span>${esc(j.owner)}</span><span>•</span><span>${esc(j.output)}</span></div></div><div class="job-progress"><b>${j.progress}%</b><div class="bar"><i style="width:${j.progress}%"></i></div></div></div><div class="job-body"><div class="output-line"><span class="output-label">Output</span><span class="output-text">${esc(j.output)}</span><span class="tag ${tagClass(j.status)}">${esc(j.outputStatus)}</span></div>${j.tasks.map(t=>taskRow(t,j.id)).join('')}</div></section>`}
function renderMiddle(){const p=currentPhase();const gateTitle=p.gate.next?`Điều kiện sang ${p.gate.next}`:'Kích hoạt công việc';document.getElementById('middle').innerHTML=`<div class="phase-head"><div class="phase-head-top"><span class="tag blue">Giai đoạn ${p.id} / 4</span><span class="tag ${p.status==='active'?'amber':'gray'}">${p.status==='active'?'Đang thực hiện':p.status==='open'?'Theo yêu cầu':'Chưa bắt đầu'}</span></div><h2>${esc(p.name)}</h2><p>${p.done}/${p.total} task hoàn thành · Quản lý: ${esc(p.owner)}</p><div class="phase-stat"><span><b>${p.progress}%</b> tiến độ</span><span><b>${p.total-p.done}</b> task còn lại</span></div></div><section class="gate"><div class="gate-title">${esc(gateTitle)}</div>${p.gate.items.map(gateRow).join('')}</section><div class="jobs"><div class="section-hint">Đầu việc</div>${p.jobs.map(jobCard).join('')}</div>`}
function detailJob(j){const form=Object.entries(j.form).map(([k,v])=>`<div class="track-row"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('');return `<div class="detail"><div class="detail-head"><h3>${esc(j.name)}</h3><div class="ref">${esc(j.id)} · ${esc(currentPhase().name)}</div><div class="detail-status"><span class="tag ${tagClass(j.status)}">${statusText[j.status]}</span><span class="tag gray">${j.done}/${j.total} task</span></div></div><div class="detail-section"><div class="detail-label">Output cần có</div><div class="important-output"><b>${esc(j.output)}</b><span>${esc(j.outputStatus)} · ${esc(j.evidence)}</span></div></div><div class="detail-section"><div class="detail-label">Phụ trách</div><div class="people"><div class="person"><small>Người phụ trách</small><b>${esc(j.owner)}</b></div><div class="person"><small>Cập nhật cuối</small><b>${esc(j.updated)}</b></div></div></div><div class="detail-section"><div class="detail-label">Thông tin theo dõi</div><div class="track-list">${form}</div></div><div class="detail-section"><div class="detail-label">Mục tiêu</div><div class="muted">${esc(j.goal)}</div></div></div>`}
function activityFor(t){const items=[];if(t.start&&t.start!=='—')items.push({text:`Bắt đầu thực hiện — ${t.assignee}`,when:t.start,kind:'blue'});if(t.status==='done')items.push({text:`Hoàn thành; ${t.confirm} xác nhận`,when:t.completed,kind:'done'});else if(t.status==='waiting')items.push({text:'Đang chờ phản hồi / xác nhận',when:t.updated,kind:'blue'});else if(t.updated!=='—')items.push({text:'Cập nhật gần nhất',when:t.updated,kind:'blue'});return items.map(x=>`<div class="log ${x.kind==='done'?'done':''}"><div>${esc(x.text)}</div><div class="when">${esc(x.when)}</div></div>`).join('')||'<div class="muted">Chưa có cập nhật.</div>'}
function detailTask(t,j){const form=Object.entries(t.form).map(([k,v])=>`<div class="track-row"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('');return `<div class="detail"><div class="detail-head"><h3>${esc(t.name)}</h3><div class="ref">${esc(t.id)} · ${esc(j.name)} · ${esc(currentPhase().name)}</div><div class="detail-status"><span class="tag ${tagClass(t.status)}">${statusText[t.status]}</span></div></div><div class="detail-section"><div class="detail-label">Phân công</div><div class="people"><div class="person"><small>Người giao</small><b>${esc(t.assignedBy)}</b></div><div class="person"><small>Người làm</small><b>${esc(t.assignee)}</b></div><div class="person"><small>Người xác nhận</small><b>${esc(t.confirm)}</b></div><div class="person"><small>Job</small><b>${esc(j.id)}</b></div></div></div><div class="detail-section"><div class="detail-label">Thời gian</div><div class="timegrid"><div class="info"><small>Bắt đầu</small><span>${esc(t.start)}</span></div><div class="info"><small>Hạn xử lý</small><span>${esc(t.due)}</span></div><div class="info"><small>Cập nhật cuối</small><span>${esc(t.updated)}</span></div><div class="info"><small>Hoàn thành</small><span>${esc(t.completed)}</span></div></div></div><div class="detail-section"><div class="detail-label">Output cần có</div><div class="important-output"><b>${esc(t.output)}</b><span>Bằng chứng: ${esc(t.evidence)}</span></div></div><div class="detail-section"><div class="detail-label">Thông tin theo dõi</div><div class="track-list">${form}</div></div><div class="detail-section"><div class="detail-label">Nhật ký</div><div class="timeline">${activityFor(t)}</div></div></div>`}
function renderDetail(){const j=findJob(activeJob);if(!j){document.getElementById('detail').innerHTML='<div class="detail-empty">Chọn một đầu việc hoặc task để xem chi tiết.</div>';return}const t=activeTask&&findTask(activeJob,activeTask);document.getElementById('detail').innerHTML=t?detailTask(t,j):detailJob(j)}
function selectPhase(i){activePhase=i;activeJob=DATA.phases[i].jobs[0]?.id||null;activeTask=null;renderHeader();renderPhases();renderMiddle();renderDetail()}
function selectJob(jid){activeJob=jid;activeTask=null;renderMiddle();renderDetail()}
function selectTask(jid,tid){activeJob=jid;activeTask=tid;renderMiddle();renderDetail()}
renderHeader();renderPhases();renderMiddle();renderDetail();
</script>
</body>
</html>
